<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marcsuezz</title>
    <link
      rel="icon"
      type="image/png"
      href="https://cdn.bio.link/uploads/profile_pictures/2026-04-19/6mnQPsO4DibP9xRCRFENvBto982UQMjy.png"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
      }

      body {
        background-color: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        color: white;
        overflow-x: hidden;
      }

      .background {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: url("https://cdn.bio.link/uploads/backgrounds/2026-04-19/mnUdhYbGlICKIjyZOUUwSuGIYNiledf1.jpg"); /* Gambar Gitar */
        background-size: cover;
        background-position: center;
        z-index: -1;
      }

      .container {
        width: 100%;
        max-width: 400px;
        padding: 40px 20px;
        text-align: center;
      }

      .profile-img {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        object-fit: cover;
        border: 3px solid rgba(255, 255, 255, 0.2);
        margin-bottom: 20px;
      }

      h1 {
        font-size: 1.5rem;
        font-weight: 600;
        margin-bottom: 30px;
        letter-spacing: 0.5px;
      }

      .links-container {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .link-card {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 16px;
        border-radius: 50px; /* Membuat lonjong seperti di gambar */
        text-decoration: none;
        color: white;
        font-weight: 400;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
      }

      .link-card:hover {
        background: rgba(255, 255, 255, 0.2);
        transform: translateY(-2px);
      }

      .icon {
        position: absolute;
        left: 20px;
        width: 40px;
        height: 40px;
      }

      /* Footer opsional */
      .footer {
        margin-top: 50px;
        font-size: 0.8rem;
        opacity: 0.6;
      }

      .tombol-gerak {
        /* Memanggil animasi 'wobble', durasi 2 detik, berulang terus-menerus */
        animation: wobble 2.5s infinite ease-in-out;
        /* Opsional: memberi warna sedikit berbeda agar lebih menonjol */
        border: 1px solid rgba(255, 255, 255, 0.3);
      }

      /* Mendefinisikan gerakan animasinya (membesar sedikit dan bergoyang) */
      @keyframes wobble {
        0%,
        100% {
          transform: scale(1) rotate(0deg);
        }
        10% {
          transform: scale(1.03) rotate(-1.5deg);
        }
        20% {
          transform: scale(1.03) rotate(1.5deg);
        }
        30% {
          transform: scale(1) rotate(0deg);
        }
        /* Dari 30% ke 100% tombol akan diam, memberi jeda sebelum goyang lagi */
      }
    </style>
  </head>
  <body>
    <div class="background"></div>

    <div class="container">
      <img
        src="https://cdn.bio.link/uploads/profile_pictures/2026-04-19/6mnQPsO4DibP9xRCRFENvBto982UQMjy.png"
        alt="Profile"
        class="profile-img"
      />

      <h1>Marcsuezz</h1>

      <div class="links-container">
        <a
          href="https://canva.com"
          target="_blank"
          class="link-card tombol-gerak"
        >
          Canva Pro
        </a>

        <a href="https://s.id/meonspotify" target="_blank" class="link-card">
          <img
            src="https://cdn.bio.link/uploads/thumbnails/2026-04-19/T9l3lxap09RaJChBploaded_cYHmRK4z.gif"
            class="icon"
            alt="Spotify"
          />
          My Spotify
        </a>

        <a href="https://s.id/findmeonroblox" target="_blank" class="link-card">
          <img
            src="https://cdn.bio.link/uploads/thumbnails/2026-04-19/0NczwuOv7fSZWMTJploaded_EiqLhNg0.gif"
            class="icon"
            style="filter: invert(1)"
            alt="Roblox"
          />
          My Roblox
        </a>
      </div>

      <div class="footer">&copy; 2026 Created by Marcsuezz.</div>
    </div>
  </body>
</html>
